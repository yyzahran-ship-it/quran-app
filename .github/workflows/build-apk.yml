name: Build APK

on:
  push:
    branches: [ master, 'claude/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Ensure UthmanicHafs font is present
        run: |
          DEST="assets/fonts/UthmanicHafs.ttf"
          # Scheherazade placeholder is committed; try to replace with the real
          # KFGQPC Uthmanic Script HAFS font (freely distributable).
          TMP="$(mktemp /tmp/font_XXXX.ttf)"
          URLS=(
            "https://fonts.qurancomplex.gov.sa/wp02/uploads/2019/08/UthmanicHafs1Ver18.ttf"
            "https://www.qurancomplex.gov.sa/quran/fonts/UthmanicHafs1Ver18.ttf"
            "https://quran.ksu.edu.sa/fonts/hafs/UthmanicHafs1Ver18.ttf"
          )
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fsSL --max-time 40 "$URL" -o "$TMP" 2>/dev/null; then
              MAGIC=$(xxd -p -l 4 "$TMP" 2>/dev/null || true)
              if [ "$MAGIC" = "00010000" ] || [ "$MAGIC" = "4f54544f" ] || [ "$MAGIC" = "74727565" ]; then
                cp "$TMP" "$DEST"
                echo "KFGQPC font installed: $(stat -c%s "$DEST") bytes"
                break
              fi
            fi
          done
          rm -f "$TMP"
          echo "Font ready: $DEST ($(stat -c%s "$DEST") bytes)"

      - name: Bundle King Fahad Mushaf page images
        run: |
          mkdir -p assets/quran/pages
          # Source: public GitHub repo with all 604 King Fahad Mushaf pages as WebP.
          # GitHub→GitHub raw content is always reachable from GitHub Actions.
          # Source uses 4-digit page numbers (0001-0604); we save as 3-digit (001-604).
          BASE="https://raw.githubusercontent.com/abuumairabuaamir/quran.images/main/QuranMajeed-15Lines-SaudiPrint_page-"

          echo "=== Downloading 604 pages from GitHub ==="
          FAILED=0
          for i in $(seq 1 604); do
            NNN=$(printf '%03d' $i)
            NNNN=$(printf '%04d' $i)
            URL="${BASE}${NNNN}.webp"
            DEST="assets/quran/pages/page${NNN}.webp"
            if curl -fsSL --max-time 60 "$URL" -o "$DEST"; then
              SZ=$(stat -c%s "$DEST" 2>/dev/null || echo 0)
              if [ "$SZ" -lt 5000 ]; then
                echo "Warning: page ${NNN} too small (${SZ} bytes), removing"
                rm -f "$DEST"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "Warning: failed page ${NNN}"
              FAILED=$((FAILED + 1))
            fi
          done
          COUNT=$(ls assets/quran/pages/page*.webp 2>/dev/null | wc -l)
          echo "=== Bundled ${COUNT}/604 pages (${FAILED} failures) ==="
          if [ "$COUNT" -lt 550 ]; then
            echo "ERROR: Too few pages bundled — aborting build."
            exit 1
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK (with full log)
        run: flutter build apk --debug --split-per-abi -v 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Upload APKs (all ABIs)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-debug
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 3
