name: Build APK

on:
  push:
    branches: [ master, 'claude/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Ensure UthmanicHafs font is present
        run: |
          DEST="assets/fonts/UthmanicHafs.ttf"
          # Scheherazade placeholder is committed; try to replace with the real
          # KFGQPC Uthmanic Script HAFS font (freely distributable).
          TMP="$(mktemp /tmp/font_XXXX.ttf)"
          URLS=(
            "https://fonts.qurancomplex.gov.sa/wp02/uploads/2019/08/UthmanicHafs1Ver18.ttf"
            "https://www.qurancomplex.gov.sa/quran/fonts/UthmanicHafs1Ver18.ttf"
            "https://quran.ksu.edu.sa/fonts/hafs/UthmanicHafs1Ver18.ttf"
          )
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fsSL --max-time 40 "$URL" -o "$TMP" 2>/dev/null; then
              MAGIC=$(xxd -p -l 4 "$TMP" 2>/dev/null || true)
              if [ "$MAGIC" = "00010000" ] || [ "$MAGIC" = "4f54544f" ] || [ "$MAGIC" = "74727565" ]; then
                cp "$TMP" "$DEST"
                echo "KFGQPC font installed: $(stat -c%s "$DEST") bytes"
                break
              fi
            fi
          done
          rm -f "$TMP"
          echo "Font ready: $DEST ($(stat -c%s "$DEST") bytes)"

      - name: Bundle King Fahad Mushaf page images
        run: |
          mkdir -p assets/quran/pages
          sudo apt-get install -y --quiet webp

          # ── Diagnostic: test CDN access before the full loop ──────────────
          echo "=== CDN access test ==="
          HTTP=$(curl -o /tmp/p001.png -w "%{http_code}" -sSL --max-time 15 \
            "https://cdn.qurancdn.com/images/quran/pages/page001.png" 2>&1 || true)
          SIZE=$(stat -c%s /tmp/p001.png 2>/dev/null || echo 0)
          echo "cdn.qurancdn.com → HTTP ${HTTP}, bytes: ${SIZE}"

          # Pick the working base URL (CDN direct, or Quran.com static bucket).
          CDN_URLS=(
            "https://cdn.qurancdn.com/images/quran/pages/page"
            "https://qurancdn.com/images/quran/pages/page"
            "https://images.quran.com/images/quran/pages/page"
            "https://static.qurancdn.com/images/quran/pages/page"
          )

          WORKING_BASE=""
          for BASE in "${CDN_URLS[@]}"; do
            echo "Testing: ${BASE}001.png"
            HTTP=$(curl -o /tmp/test_p.png -w "%{http_code}" -sSL --max-time 15 \
              "${BASE}001.png" 2>&1 || true)
            SZ=$(stat -c%s /tmp/test_p.png 2>/dev/null || echo 0)
            echo "  → HTTP ${HTTP}, ${SZ} bytes"
            if [ "$SZ" -gt 10000 ]; then
              WORKING_BASE="$BASE"
              echo "  ✓ Using this CDN"
              break
            fi
          done

          if [ -z "$WORKING_BASE" ]; then
            echo "ERROR: No CDN is reachable. Mushaf pages will not be bundled."
            echo "Run the 'Setup Mushaf Pages Branch' workflow once to populate"
            echo "the mushaf-pages branch, then re-run this build."
            # Do not exit 1 — the app has a text fallback so the APK still works.
          else
            # ── Download all 604 pages from the working CDN ─────────────────
            FAILED=0
            for i in $(seq 1 604); do
              NNN=$(printf '%03d' $i)
              TMP="/tmp/mp_${NNN}.png"
              DEST_WEBP="assets/quran/pages/page${NNN}.webp"
              if curl -fsSL --max-time 40 "${WORKING_BASE}${NNN}.png" \
                -o "$TMP" 2>/dev/null; then
                cwebp -q 88 -quiet "$TMP" -o "$DEST_WEBP" 2>/dev/null \
                  || cp "$TMP" "assets/quran/pages/page${NNN}.png"
                rm -f "$TMP"
              else
                FAILED=$((FAILED + 1))
              fi
            done
            COUNT=$(ls assets/quran/pages/page*.{webp,png} 2>/dev/null | wc -l)
            echo "=== Bundled ${COUNT}/604 pages (${FAILED} failures) ==="
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK (with full log)
        run: flutter build apk --debug --split-per-abi -v 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Upload APKs (all ABIs)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-debug
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 3
