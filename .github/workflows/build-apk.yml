name: Build APK

on:
  push:
    branches: [ master, 'claude/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Download KFGQPC Uthmanic Script HAFS font
        run: |
          # The KFGQPC Uthmanic Script HAFS font is the official King Fahad
          # Quran Printing Complex font. Freely distributable for Quran apps.
          # Try multiple official mirrors; fall back to AmiriQuran if unavailable.
          DEST="assets/fonts/UthmanicHafs.ttf"
          FALLBACK="assets/fonts/AmiriQuran.ttf"

          download_font() {
            local url="$1"
            echo "Trying: $url"
            curl -fsSL --max-time 30 "$url" -o "$DEST" 2>/dev/null && \
            python3 -c "
import struct, sys
data = open('$DEST','rb').read(4)
sys.exit(0 if data[:4] in [b'\\x00\\x01\\x00\\x00', b'OTTO', b'true'] else 1)
" && return 0 || return 1
          }

          # Official King Fahad Quran Printing Complex sources
          download_font "https://fonts.qurancomplex.gov.sa/wp02/uploads/2019/08/UthmanicHafs1Ver18.ttf" ||
          download_font "https://www.qurancomplex.gov.sa/quran/fonts/UthmanicHafs1Ver18.ttf" ||
          download_font "https://quran.ksu.edu.sa/fonts/hafs/UthmanicHafs1Ver18.ttf" ||
          {
            echo "All font download attempts failed — copying AmiriQuran as fallback"
            cp "$FALLBACK" "$DEST"
          }

          SIZE=$(stat -c%s "$DEST")
          echo "Font ready: $DEST ($SIZE bytes)"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK (with full log)
        run: flutter build apk --debug --split-per-abi -v 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Upload APKs (all ABIs)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-debug
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 3
