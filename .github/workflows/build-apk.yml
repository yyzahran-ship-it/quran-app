name: Build APK

on:
  push:
    branches: [ master, 'claude/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Ensure UthmanicHafs font is present
        run: |
          DEST="assets/fonts/UthmanicHafs.ttf"
          # Scheherazade placeholder is committed; try to replace with the real
          # KFGQPC Uthmanic Script HAFS font (freely distributable).
          TMP="$(mktemp /tmp/font_XXXX.ttf)"
          URLS=(
            "https://fonts.qurancomplex.gov.sa/wp02/uploads/2019/08/UthmanicHafs1Ver18.ttf"
            "https://www.qurancomplex.gov.sa/quran/fonts/UthmanicHafs1Ver18.ttf"
            "https://quran.ksu.edu.sa/fonts/hafs/UthmanicHafs1Ver18.ttf"
          )
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fsSL --max-time 40 "$URL" -o "$TMP" 2>/dev/null; then
              MAGIC=$(xxd -p -l 4 "$TMP" 2>/dev/null || true)
              if [ "$MAGIC" = "00010000" ] || [ "$MAGIC" = "4f54544f" ] || [ "$MAGIC" = "74727565" ]; then
                cp "$TMP" "$DEST"
                echo "KFGQPC font installed: $(stat -c%s "$DEST") bytes"
                break
              fi
            fi
          done
          rm -f "$TMP"
          echo "Font ready: $DEST ($(stat -c%s "$DEST") bytes)"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK (with full log)
        run: flutter build apk --debug --split-per-abi -v 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Upload APKs (all ABIs)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-debug
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 3
                - name: Apply King Fahd Mushaf Fonts and Style
        run: |
          # 1. Choose the file you want to style (change 'index.html' to your specific file name)
          TARGET_FILE="index.html"
          
          # 2. This defines the official KFGQPC style settings
          MUSHAF_STYLES='<style>
            @font-face {
                font-family: "QCF4_Hafs";
                src: url("https://cdn.jsdelivr.net/gh/MohamadHajjRabee/quran-qcf4@main/fonts-woff2/QCF4_Hafs_01_W.woff2") format("woff2");
                font-weight: normal;
                font-style: normal;
            }
            .mushaf-container {
                font-family: "QCF4_Hafs", "Traditional Arabic", serif;
                font-size: 32px;
                line-height: 2.2;
                text-align: center;
                direction: rtl;
                background-color: #fcfbf7; /* Authentic cream page tint */
                color: #1a1a1a;
                padding: 30px;
                border: 1px solid #d4af37; /* Subtle gold border */
                border-radius: 4px;
            }
          </style>'
          
          # 3. Inject the styles into your file right before the closing </head> tag
          sed -i "s|</head>|${MUSHAF_STYLES}</head>|g" "$TARGET_FILE"
          
          # 4. Wrap your text content inside the mushaf-container class
          # (This assumes your file has a generic <body> text that needs wrapping)
          sed -i 's|<body>|<body><div class="mushaf-container">|g' "$TARGET_FILE"
          sed -i 's|</body>|</div></body>|g' "$TARGET_FILE"

