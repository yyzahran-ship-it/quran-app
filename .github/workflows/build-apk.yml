name: Build APK

on:
  push:
    branches: [ master, 'claude/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Ensure UthmanicHafs font is present
        run: |
          DEST="assets/fonts/UthmanicHafs.ttf"
          # Try to replace the bundled placeholder with the real KFGQPC Uthmanic
          # Script HAFS font from the King Fahad Quran Printing Complex (freely
          # distributable). Falls back to the committed Scheherazade placeholder.
          TMP="$(mktemp /tmp/font_XXXX.ttf)"
          is_valid_font() {
            python3 -c "
import sys
try:
    data = open('$1','rb').read(4)
    valid = data[:4] in [b'\\x00\\x01\\x00\\x00', b'OTTO', b'true']
    size  = $(stat -c%s "$1" 2>/dev/null || echo 0)
    sys.exit(0 if valid and size > 300000 else 1)
except Exception:
    sys.exit(1)
" 2>/dev/null
          }
          URLS=(
            "https://fonts.qurancomplex.gov.sa/wp02/uploads/2019/08/UthmanicHafs1Ver18.ttf"
            "https://www.qurancomplex.gov.sa/quran/fonts/UthmanicHafs1Ver18.ttf"
            "https://quran.ksu.edu.sa/fonts/hafs/UthmanicHafs1Ver18.ttf"
          )
          INSTALLED=false
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fsSL --max-time 40 "$URL" -o "$TMP" 2>/dev/null && is_valid_font "$TMP"; then
              cp "$TMP" "$DEST"
              echo "KFGQPC font installed: $(stat -c%s "$DEST") bytes"
              INSTALLED=true
              break
            fi
          done
          rm -f "$TMP"
          if [ "$INSTALLED" = false ]; then
            echo "Download failed — using committed placeholder font"
          fi
          echo "Font ready: $DEST ($(stat -c%s "$DEST") bytes)"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK (with full log)
        run: flutter build apk --debug --split-per-abi -v 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Upload APKs (all ABIs)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-debug
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 3
